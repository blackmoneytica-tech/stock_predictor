name: KR V25-full Monthly Rebal

# 매월 21번째 영업일에 자동 실행 — GitHub cron은 정확한 영업일 trigger 어려우니
# 매월 25-31일 KST 17:00에 trigger + 마지막 실행 21d+ 경과 시에만 rebal.
# 더 간단: 매월 마지막 평일 또는 사용자 수동 trigger.

on:
  # 매월 마지막 금요일 (=25-31일 사이 금요일) KST 17:00 (UTC 08:00)
  # 마지막 금요일이 25-27일일 수도 있으니 25-31 범위로 확장 + Python step에서 21d 경과 확인
  schedule:
    # 매월 22-31일 중 금요일 UTC 08:00 — 마지막 금요일이 22~24일인 달도 커버.
    # 스크립트(do_rebal)가 "이번달 마지막 금요일"인지 체크해 중복 실행 방지.
    - cron: '0 8 22-31 * 5'
  workflow_dispatch:
    inputs:
      reason:
        description: '수동 rebal 사유 (선택)'
        required: false
        default: ''

jobs:
  monthly_rebal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      # 두 KR workflow를 같은 group으로 묶어서 동시 push 충돌 방지
      group: kr-dashboard
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR monthly rebal publisher
        env:
          TG_BOT_TOKEN: ${{ secrets.KR_TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.KR_TG_CHAT_ID }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          PYTHONIOENCODING: utf-8
          # 수동 실행은 마지막 금요일 체크 없이 강제 rebal, cron은 마지막 금요일에만
          KR_FORCE_REBAL: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: |
          python scripts/kr_publish_json.py --mode both

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kr_dashboard/data/*.json
          git add -f data/flow_history.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[kr-monthly] $(date -u +%Y-%m-%d) rebal picking"
            # Retry with rebase on conflict (race with daily workflow)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cf2d2ff56ad968ff1845660517b88fe7
        run: |
          npx --yes wrangler@4 pages deploy kr_dashboard --project-name=kr-v25 --commit-dirty=true

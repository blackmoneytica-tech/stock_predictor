name: Predict Watchlist

on:
  # 미국 장중심 평일 5회 (UTC, KST = +9시간) — 과도한 hourly 실행이 abuse 플래그/정지를 유발했던 것 축소
  # UTC 13/15/17/19/21시 = KST 22/00/02/04/06시 (미국 프리마켓~정규장~마감 커버)
  # 5d/1d 예측이라 매시간은 과잉. 조정: https://crontab.guru
  schedule:
    - cron: '0 13,15,17,19,21 * * 1-5'

  # 수동 트리거 (GitHub UI "Run workflow" 또는 gh CLI)
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (빈 값이면 watchlist 자동 fetch)'
        required: false
        default: ''
      horizons:
        description: 'Horizons (예: 1,3,5)'
        required: false
        default: '1,3,5'
      force:
        description: 'Cooldown 무시 (수동 trigger=1)'
        required: false
        default: ''

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      # 중복 실행 방지 — 진행 중인 동일 워크플로 cancel 안 함 (대기)
      group: predict-watchlist
      cancel-in-progress: false
    env:
      TRADE_JOURNAL_URL: ${{ secrets.TRADE_JOURNAL_URL }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
      MARKETDATA_KEY: ${{ secrets.MARKETDATA_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run analysis
        run: |
          ARGS="--horizons ${{ github.event.inputs.horizons || '1,3,5' }}"
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="$ARGS --tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ -n "${{ github.event.inputs.force }}" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/run_watchlist_analysis.py $ARGS

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            data/results/*.log
          retention-days: 7

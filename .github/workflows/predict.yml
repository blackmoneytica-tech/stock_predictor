name: Predict Watchlist

on:
  # 매시간 (UTC 기준 매 정각, KST = +9시간)
  # ── 사용자가 cron 조정 가능: https://crontab.guru ──
  # 예: '0 */2 * * *' = 매 2시간, '0 */4 * * *' = 매 4시간
  # 현재: 매시간
  schedule:
    - cron: '0 * * * *'

  # 수동 트리거 (GitHub UI "Run workflow" 또는 gh CLI)
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (빈 값이면 watchlist 자동 fetch)'
        required: false
        default: ''
      horizons:
        description: 'Horizons (예: 1,3,5)'
        required: false
        default: '1,3,5'
      force:
        description: 'Cooldown 무시 (수동 trigger=1)'
        required: false
        default: ''

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      # 중복 실행 방지 — 진행 중인 동일 워크플로 cancel 안 함 (대기)
      group: predict-watchlist
      cancel-in-progress: false
    env:
      TRADE_JOURNAL_URL: ${{ secrets.TRADE_JOURNAL_URL }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
      MARKETDATA_KEY: ${{ secrets.MARKETDATA_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run analysis
        run: |
          ARGS="--horizons ${{ github.event.inputs.horizons || '1,3,5' }}"
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="$ARGS --tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ -n "${{ github.event.inputs.force }}" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/run_watchlist_analysis.py $ARGS

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            data/results/*.log
          retention-days: 7
